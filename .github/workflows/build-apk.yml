name: Build Griya APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode sumber dari repositori GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Siapkan lingkungan Java JDK versi 17
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3. Siapkan Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # 4. Ambil semua dependensi pubspec.yaml
      - name: Install Dependencies
        run: flutter pub get

      # 5. REVISI MUTLAK: Tambahkan flag bypass validasi versi agar server tidak mogok
      - name: Build APK Debug
        run: flutter build apk --debug --android-skip-build-dependency-validation

      # 6. Unggah hasil APK ke server agar bisa diunduh langsung di HP
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: griya-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
